name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - ".github/workflows/release.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "electron.vite.config.ts"
      - "build/**"
      - "resources/icon.png"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package-macos:
    name: macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-latest
          - arch: x64
            runner: macos-13

    env:
      ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build renderer and Electron bundles
        run: pnpm run build

      - name: Package macOS ${{ matrix.arch }}
        run: pnpm exec electron-builder --mac --${{ matrix.arch }} --publish never

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CharacterArc-macos-${{ matrix.arch }}
          if-no-files-found: error
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
            dist/latest-mac.yml

  package-windows:
    name: Windows ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: windows-latest
          - arch: arm64
            runner: windows-11-arm64

    env:
      ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
      ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build renderer and Electron bundles
        run: pnpm run build

      - name: Package Windows ${{ matrix.arch }}
        run: pnpm exec electron-builder --win --${{ matrix.arch }} --publish never

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CharacterArc-windows-${{ matrix.arch }}
          if-no-files-found: error
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml

  package-linux:
    name: Linux ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm

    env:
      ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
      ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build renderer and Electron bundles
        run: pnpm run build

      - name: Package Linux ${{ matrix.arch }}
        run: pnpm exec electron-builder --linux --${{ matrix.arch }} --publish never

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CharacterArc-linux-${{ matrix.arch }}
          if-no-files-found: error
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.blockmap
            dist/latest-linux.yml
